name: release-please

# Why "simple" release-type (release-please-config.json):
#   release-please-rust @v4 auto-scans workspace members and tries to bump
#   each crate's [package].version. Our crates inherit via
#   `version.workspace = true`, which is a TOML table, not a tagged scalar
#   — the rust strategy errors with "value at path package.version is not
#   tagged". Switching to "simple" + an explicit toml jsonpath at
#   $.workspace.package.version on the root Cargo.toml bumps the
#   single source of truth; crate Cargo.tomls are untouched.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Use a fine-grained PAT (not the default GITHUB_TOKEN) so the release
          # PR it opens triggers CI/relock workflows. Pushes made with the default
          # token cannot trigger other workflows (GitHub loop prevention), which
          # leaves the release PR's checks stuck in "action_required".
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

name: release-please

# Why "simple" release-type (release-please-config.json):
#   release-please-rust @v4 auto-scans workspace members and tries to bump
#   each crate's [package].version. Our crates inherit via
#   `version.workspace = true`, which is a TOML table, not a tagged scalar
#   — the rust strategy errors with "value at path package.version is not
#   tagged". Switching to "simple" + an explicit toml jsonpath at
#   $.workspace.package.version on the root Cargo.toml bumps the
#   single source of truth; crate Cargo.tomls are untouched.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        with:
          # Mint a short-lived token from the release GitHub App (not the default
          # GITHUB_TOKEN) so the release PR triggers CI/relock workflows. Pushes
          # made with the default token cannot trigger other workflows (GitHub
          # loop prevention), which leaves the release PR stuck in
          # "action_required".
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

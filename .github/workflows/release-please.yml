name: release-please

# Why "simple" release-type (release-please-config.json):
#   release-please-rust @v4 auto-scans workspace members and tries to bump
#   each crate's [package].version. Our crates inherit via
#   `version.workspace = true`, which is a TOML table, not a tagged scalar
#   — the rust strategy errors with "value at path package.version is not
#   tagged". Switching to "simple" + an explicit toml jsonpath at
#   $.workspace.package.version on the root Cargo.toml bumps the
#   single source of truth; crate Cargo.tomls are untouched.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      pr_branch: ${{ steps.rp.outputs.pr && fromJSON(steps.rp.outputs.pr).headBranchName }}
      release_created: ${{ steps.rp.outputs.release_created }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          # Use a PAT so the release PR is authored by a real user, not the
          # GITHUB_TOKEN. PRs (and pushes) made with GITHUB_TOKEN do NOT
          # trigger pull_request/push workflows (GitHub anti-recursion), which
          # left the required CI checks stuck on action_required and the
          # release PR unmergeable. Falls back to GITHUB_TOKEN when the secret
          # is unset, preserving prior behavior until the PAT is added.
          token: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  refresh-cargo-lock:
    # When release-please opens/updates a release PR, the workspace version
    # bump in Cargo.toml leaves Cargo.lock stale. Refresh it on the PR
    # branch so subsequent CI sees a consistent lockfile.
    # The PR branch name comes from the release-please action's structured
    # output, NOT untrusted user input — safe to interpolate.
    needs: release-please
    if: needs.release-please.outputs.pr_branch != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.pr_branch }}
          # Same PAT (with GITHUB_TOKEN fallback): the Cargo.lock refresh commit
          # is the last push to the release PR branch, so it must come from a
          # real user for CI to run on the final PR head.
          token: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Refresh Cargo.lock with new workspace version
        run: |
          cargo update --workspace --quiet
          if ! git diff --quiet Cargo.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock
            git commit -m "chore: refresh Cargo.lock for release"
            git push
          fi

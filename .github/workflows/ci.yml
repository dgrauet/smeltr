name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build metal-hook dylib (required for hook integration tests)
        run: make -C metal-hook clean all

      - name: Build metal harness for e2e tests
        run: cargo build -p smeltr-metal-harness

      - name: cargo test
        run: cargo test --workspace

  python:
    name: Python sidecar
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install Python
        run: uv python install $(cat .python-version)

      - name: Create venv + install package
        working-directory: python
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e '.[dev]'

      - name: ruff lint
        working-directory: python
        run: .venv/bin/ruff check .

      - name: ruff format check
        working-directory: python
        run: .venv/bin/ruff format --check .

      - name: ty check
        working-directory: python
        run: .venv/bin/ty check

      - name: pytest
        working-directory: python
        run: .venv/bin/pytest tests --ignore=tests/test_e2e_daemon.py

  intendant:
    name: intendant audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"

      - name: Install intendant
        # The runner's pre-installed pipx uses Python <3.13; force it to use
        # the 3.13 we just set up so it can resolve intendant 4.0.0+.
        run: pipx install --python "$(which python3)" intendant

      - name: Audit
        run: intendant audit . --severity required

  commitlint:
    name: commitlint (conventional commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed  # v6.2.1
        with:
          configFile: commitlint.config.mjs

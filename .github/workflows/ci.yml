name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build metal harness for e2e tests
        run: cargo build -p smeltr-metal-harness

      - name: cargo test
        run: cargo test --workspace

  python:
    name: Python sidecar
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python
        run: uv python install $(cat .python-version)

      - name: Create venv + install package
        working-directory: python
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e '.[dev]'

      - name: ruff lint
        working-directory: python
        run: .venv/bin/ruff check .

      - name: ruff format check
        working-directory: python
        run: .venv/bin/ruff format --check .

      - name: ty check
        working-directory: python
        run: .venv/bin/ty check

      - name: pytest
        working-directory: python
        run: .venv/bin/pytest tests --ignore=tests/test_e2e_daemon.py

  intendant:
    name: intendant audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install intendant
        # The runner's pre-installed pipx uses Python <3.13; force it to use
        # the 3.13 we just set up so it can resolve intendant 4.0.0+.
        run: pipx install --python "$(which python3)" intendant

      - name: Audit
        run: intendant audit . --severity required

  commitlint:
    name: commitlint (conventional commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.js

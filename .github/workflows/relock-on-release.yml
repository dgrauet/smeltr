name: relock-on-release-pr

# release-please bumps the workspace version in Cargo.toml but not Cargo.lock;
# re-lock on its PR so the committed lockfile matches the released version.
on:
  pull_request:
    branches: [main]
    paths: [Cargo.toml]

permissions:
  contents: write

concurrency:
  group: relock-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  relock:
    # Gate on the release bot: only a Bot-authored `release-please--` PR (i.e. the
    # release GitHub App) runs the relock. A human collaborator who forges a
    # `release-please--` branch has user.type == 'User' and is excluded, so the
    # App token never runs against a crafted Cargo.toml.
    if: >-
      github.event.pull_request.user.type == 'Bot' &&
      startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          # Don't persist the token in .git/config; the push step re-supplies it
          # via an explicit URL. Defense-in-depth.
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Regenerate Cargo.lock
        run: cargo update --workspace
      - name: Commit and push if changed
        env:
          # Token is exposed only to this final step, which runs trusted git
          # commands.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if ! git diff --quiet Cargo.lock; then
            git config user.name "smeltr-release"
            git config user.email "release@users.noreply.github.com"
            git add Cargo.lock
            git commit -m "chore: sync Cargo.lock with release version"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${HEAD_REF}"
          fi
